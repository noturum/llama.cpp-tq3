name: UI

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA1 to build'
        required: false
        type: string
  push:
    branches:
      - master
    paths: [
      '.github/workflows/ui.yml',
      '.github/workflows/ui-build.yml',
      'tools/ui/**.*',
      'tools/server/tests/**.*'
    ]
  pull_request:
    types: [opened, synchronize, reopened]
    paths: [
      '.github/workflows/ui.yml',
      '.github/workflows/ui-build.yml',
      'tools/ui/**.*',
      'tools/server/tests/**.*'
    ]

env:
  LLAMA_ARG_LOG_COLORS: 1
  LLAMA_ARG_LOG_PREFIX: 1
  LLAMA_ARG_LOG_TIMESTAMPS: 1
  LLAMA_ARG_LOG_VERBOSITY: 10

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect UI changes
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.sha || github.event.pull_request.head.sha || github.sha || github.head_ref || github.ref_name }}

      - name: Detect changed UI files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'tools/ui/**'

  ui-build:
    name: Build static output
    if: github.repository == 'ggml-org/llama.cpp'
    uses: ./.github/workflows/ui-build.yml

  ui-checks:
    name: Checks
    needs: [changes, ui-build]
    if: github.repository == 'ggml-org/llama.cpp'
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.sha || github.event.pull_request.head.sha || github.sha || github.head_ref || github.ref_name }}

      - name: Skip when UI is unchanged
        if: ${{ needs.changes.outputs.ui != 'true' }}
        run: echo "No tools/ui changes detected; skipping UI checks."

      - name: Setup Node.js
        id: node
        if: ${{ needs.changes.outputs.ui == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "tools/ui/package-lock.json"

      - name: Download built UI artifacts
        uses: actions/download-artifact@v6
        with:
          name: ui-build
          path: tools/ui/dist/

      - name: Install dependencies
        id: setup
        if: ${{ needs.changes.outputs.ui == 'true' && steps.node.conclusion == 'success' }}
        run: npm ci
        working-directory: tools/ui

      - name: Run type checking
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.setup.conclusion == 'success' }}
        run: npm run check
        working-directory: tools/ui

      - name: Run linting
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.setup.conclusion == 'success' }}
        run: npm run lint
        working-directory: tools/ui

      - name: Install Playwright browsers
        id: playwright
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.setup.conclusion == 'success' }}
        run: npx playwright install --with-deps
        working-directory: tools/ui

      - name: Run Client tests
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.playwright.conclusion == 'success' }}
        run: npm run test:client
        working-directory: tools/ui

      - name: Run Unit tests (uses pre-built dist/ from ui-build)
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.playwright.conclusion == 'success' }}
        run: npm run test:unit
        working-directory: tools/ui

  e2e-tests:
    name: E2E Tests
    needs: [changes, ui-build]
    if: github.repository == 'ggml-org/llama.cpp'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.sha || github.event.pull_request.head.sha || github.sha || github.head_ref || github.ref_name }}

      - name: Skip when UI is unchanged
        if: ${{ needs.changes.outputs.ui != 'true' }}
        run: echo "No tools/ui changes detected; skipping UI E2E tests."

      - name: Setup Node.js
        id: node
        if: ${{ needs.changes.outputs.ui == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "tools/ui/package-lock.json"

      - name: Install dependencies
        id: setup
        if: ${{ needs.changes.outputs.ui == 'true' && steps.node.conclusion == 'success' }}
        run: npm ci
        working-directory: tools/ui

      - name: Download built UI artifacts (reuses ui-build)
        uses: actions/download-artifact@v6
        with:
          name: ui-build
          path: tools/ui/dist/

      - name: Install Playwright browsers
        id: playwright
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.setup.conclusion == 'success' }}
        run: npx playwright install --with-deps
        working-directory: tools/ui

      - name: Build Storybook
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.playwright.conclusion == 'success' }}
        run: npm run build-storybook
        working-directory: tools/ui

      - name: Run UI tests
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.playwright.conclusion == 'success' }}
        run: npm run test:ui -- --testTimeout=60000
        working-directory: tools/ui

      - name: Run E2E tests (uses pre-built dist/ from ui-build)
        if: ${{ needs.changes.outputs.ui == 'true' && always() && steps.playwright.conclusion == 'success' }}
        run: npm run test:e2e
        working-directory: tools/ui
